<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Cursos</title>

</head>

<body>

<h1>Listado Cursos</h1>

<a href="/cursos/nuevo">
Nuevo Curso
</a>

<table border="1">

<tr>

<th>ID</th>
<th>Curso</th>
<th>Profesor</th>

</tr>

<tr th:each="c : ${lista}">

<td th:text="${c.id}"></td>

<td th:text="${c.nombre}"></td>

<td th:text="${c.profesor}"></td>

</tr>

</table>

</body>

</html>
