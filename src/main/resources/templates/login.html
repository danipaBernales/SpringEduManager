<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
          th:href="@{/css/styles.css}">

</head>

<body>

<div class="login-container">

    <h1>SpringEduManager</h1>

    <form th:action="@{/login}"
          method="post">

        <input type="text"
               name="username"
               placeholder="Usuario"
               required>

        <input type="password"
               name="password"
               placeholder="Contraseña"
               required>

        <button type="submit">

            Iniciar Sesión

        </button>

    </form>

    <div th:if="${param.error}"
         class="error">

        Usuario o contraseña incorrectos

    </div>

    <div th:if="${param.logout}"
         class="success">

        Sesión cerrada correctamente

    </div>

</div>

<script th:src="@{/js/app.js}"></script>

</body>

</html>
